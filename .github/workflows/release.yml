        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-runtime-evidence-${{ needs.publish-release-assets.outputs.release-tag }}-x86
          path: artifacts/release/runtime-evidence-x86-*.json

  validate-arm64-release-assets:
    if: vars.WPFDEVTOOLS_ENABLE_ARM64_RUNTIME_SMOKE == 'true'
    needs: publish-release-assets
    runs-on: [self-hosted, Windows, ARM64]
    env:
      RELEASE_STAGING_ROOT: artifacts/release/github-assets
      WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
      WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT }}

    steps:
