name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

    - name: Resolve native host SDK paths
      shell: pwsh
      run: |
        $rid = 'win-x64'
        $packRoot = Join-Path $env:ProgramFiles 'dotnet\packs'
        $packDir = Get-ChildItem (Join-Path $packRoot "Microsoft.NETCore.App.Host.$rid") -Directory |
          Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1

        if (-not $packDir) {
          throw "Could not locate Microsoft.NETCore.App.Host pack for $rid"
        }

        $nativeDir = Join-Path $packDir.FullName "runtimes\$rid\native"
        if (-not (Test-Path $nativeDir)) {
          throw "Could not locate native host directory: $nativeDir"
        }

        "BOOTSTRAPPER_NATIVE_DIR=$nativeDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Run .NET analyzer gate
      shell: pwsh
      run: |
        $env:PATH = "$env:DOTNET_ROOT;$env:PATH"
        $dotnet = Join-Path $env:DOTNET_ROOT 'dotnet.exe'
        if (-not (Test-Path -LiteralPath $dotnet)) {
          $dotnet = (Get-Command dotnet -ErrorAction Stop).Source
        }

        & $dotnet format WpfDevTools.sln analyzers --verify-no-changes --severity error --no-restore

    - name: Run PowerShell ScriptAnalyzer
      shell: pwsh
      run: |
        Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
        Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -RequiredVersion 1.25.0 -Repository PSGallery

        ./scripts/tools/security/Invoke-PowerShellScriptAnalyzerGate.ps1 -Path 'scripts' -Severity Error

    - name: Run repository secret pattern scan
      shell: pwsh
      run: |
        ./scripts/tools/security/Invoke-RepositorySecretScan.ps1

    - name: Run native bootstrapper security analysis
      shell: pwsh
      run: |
        & msbuild src/WpfDevTools.Bootstrapper/WpfDevTools.Bootstrapper.vcxproj `
          /m `
          /nologo `
          "/p:Configuration=Release" `
          "/p:Platform=x64" `
          "/p:PreferredToolArchitecture=x64" `
          "/p:LinkIncremental=false" `
          "/p:NetHostIncludeDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:NetHostLibDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:RunCodeAnalysis=true" `
          "/p:TreatWarningsAsErrors=true"
