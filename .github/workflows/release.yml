name: Publish Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to package and upload
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-release-assets:
    runs-on: windows-2022
    outputs:
      release-tag: ${{ steps.release-metadata.outputs.tag }}
      is-e2e-validation-release: ${{ steps.release-metadata.outputs.is-e2e-validation-release }}
      is-prerelease-release: ${{ steps.release-metadata.outputs.is-prerelease-release }}
      tag-commit-sha: ${{ steps.tag-checkout.outputs.tag-commit-sha }}
      release-trust-mode: ${{ steps.release-trust-mode.outputs.release-trust-mode }}
    env:
      RELEASE_OUTPUT_ROOT: artifacts/release/github-release
      RELEASE_STAGING_ROOT: artifacts/release/github-assets

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-metadata
        shell: pwsh
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        run: |
          $tag = if ($env:RELEASE_EVENT_NAME -eq 'release') {
            $env:RELEASE_EVENT_TAG
          }
          else {
            $env:RELEASE_INPUT_TAG
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is required.'
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$') {
            throw "Release tag '$tag' must be a v-prefixed SemVer tag."
          }

          $isE2EValidationRelease = $tag -match '^v\d+\.\d+\.\d+-e2e\.[0-9A-Za-z][0-9A-Za-z.-]*$'
          $isPrereleaseRelease = $tag -match '^v\d+\.\d+\.\d+-[0-9A-Za-z][0-9A-Za-z.-]*$'
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "is-e2e-validation-release=$($isE2EValidationRelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "is-prerelease-release=$($isPrereleaseRelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout tagged revision
        id: tag-checkout
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release-metadata.outputs.tag }}
        run: |
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$') {
            throw "Release tag '$tag' must be a v-prefixed SemVer tag."
          }

          git fetch --tags --force
          git rev-parse --verify --end-of-options "refs/tags/$tag^{commit}" | Out-Null
          git checkout --detach "refs/tags/$tag"
          $tagCommit = (git rev-parse HEAD).Trim()
          if ($tagCommit -notmatch '^[0-9a-f]{40}$') {
            throw "Checked-out release tag resolved to an invalid commit SHA: $tagCommit"
          }
          "tag-commit-sha=$tagCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Skip formal publishing for E2E validation release
        if: steps.release-metadata.outputs.is-e2e-validation-release == 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping signed release asset publishing for E2E validation release ${{ steps.release-metadata.outputs.tag }}."

      - name: Setup .NET
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Restore local tools
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        run: dotnet tool restore

      - name: Restore project dependencies
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        run: dotnet restore WpfDevTools.sln --locked-mode

      - name: Build shared assembly for API docs
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        run: dotnet build src/WpfDevTools.Shared/WpfDevTools.Shared.csproj -c Debug -f net8.0

      - name: Build SDK assembly for API docs
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        run: dotnet build src/WpfDevTools.Inspector.Sdk/WpfDevTools.Inspector.Sdk.csproj -c Debug -f net8.0-windows

      - name: Build DocFX site
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        run: dotnet tool run docfx docfx/docfx.json

      - name: Validate DocFX links and parity
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        shell: pwsh
        run: ./scripts/ci/Test-DocFxDocumentation.ps1 -RepoRoot $PWD -EvidenceOutputPath artifacts/release/docfx-evidence.json

      - name: Write release security evidence
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        shell: pwsh
        run: ./scripts/tools/packaging/Write-ReleaseSecurityEvidence.ps1 -OutputPath artifacts/release/security-evidence.json -Configuration Release

      - name: Resolve release trust mode
        id: release-trust-mode
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        shell: pwsh
        env:
          RELEASE_IS_PRERELEASE: ${{ steps.release-metadata.outputs.is-prerelease-release }}
          WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64: ${{ secrets.WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64 }}
          WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
          WPFDEVTOOLS_PFX_PASSWORD: ${{ secrets.WPFDEVTOOLS_PFX_PASSWORD }}
        run: |
          $hasSigningSecrets =
            -not [string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64) -and
            -not [string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT) -and
            -not [string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_PFX_PASSWORD)

          if ($hasSigningSecrets) {
            $trustMode = 'Signed'
          }
          elseif ($env:RELEASE_IS_PRERELEASE -eq 'true') {
            $trustMode = 'ReleaseChecksumOnly'
            Write-Host 'Signing secrets are unavailable; prerelease assets will use SHA256 release metadata only.'
          }
          else {
            throw 'Stable release packaging requires signing secrets. Configure WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64, WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT, and WPFDEVTOOLS_PFX_PASSWORD, or publish a prerelease tag.'
          }

          "RELEASE_TRUST_MODE=$trustMode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "release-trust-mode=$trustMode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Materialize signing certificate
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true' && steps.release-trust-mode.outputs.release-trust-mode == 'Signed'
        shell: pwsh
        env:
          WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64: ${{ secrets.WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64)) {
            throw 'GitHub Release packaging requires WPFDEVTOOLS_RELEASE_CERTIFICATE_BASE64.'
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP 'wpf-devtools-release-signing.pfx'
          ./scripts/tools/packaging/Write-ReleaseSigningCertificate.ps1 `
            -CertificatePath $certificatePath `
            -GitHubEnvPath $env:GITHUB_ENV

      - name: Validate signing secrets
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true' && steps.release-trust-mode.outputs.release-trust-mode == 'Signed'
        shell: pwsh
        env:
          WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
          WPFDEVTOOLS_PFX_PASSWORD: ${{ secrets.WPFDEVTOOLS_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT)) {
            throw 'GitHub Release packaging requires WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT.'
          }

          if ([string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_PFX_PASSWORD)) {
            throw 'GitHub Release packaging requires WPFDEVTOOLS_PFX_PASSWORD.'
          }

      - name: Report ARM64 release policy
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        shell: pwsh
        env:
          RELEASE_IS_PRERELEASE: ${{ steps.release-metadata.outputs.is-prerelease-release }}
        run: |
          if ($env:RELEASE_IS_PRERELEASE -eq 'true') {
            Write-Host 'ARM64 release archives are prerelease-only preview assets until practical Windows-on-ARM validation hardware is available.'
          }
          else {
            Write-Host 'Stable release assets are limited to x64 and x86.'
          }

          if ('${{ vars.WPFDEVTOOLS_ENABLE_ARM64_RUNTIME_SMOKE }}' -eq 'true') {
            Write-Host 'ARM64 runtime smoke is enabled for prerelease validation.'
          }
          else {
            Write-Host 'ARM64 runtime smoke is disabled; prerelease ARM64 runtime validation will be skipped.'
          }

      - name: Build release packages
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release-metadata.outputs.tag }}
          RELEASE_IS_PRERELEASE: ${{ steps.release-metadata.outputs.is-prerelease-release }}
          RELEASE_TRUST_MODE: ${{ steps.release-trust-mode.outputs.release-trust-mode }}
          WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
          WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT }}
          WPFDEVTOOLS_PFX_PASSWORD: ${{ secrets.WPFDEVTOOLS_PFX_PASSWORD }}
        run: |
          $releaseArchitectures = @('x64', 'x86')
          if ($env:RELEASE_IS_PRERELEASE -eq 'true') {
            $releaseArchitectures += 'arm64'
          }

          ./scripts/tools/packaging/Publish-Release.ps1 `
            -Configuration Release `
            -Architectures $releaseArchitectures `
            -ExpectedReleaseTag $env:RELEASE_TAG `
            -ReleaseTrustMode $env:RELEASE_TRUST_MODE `
            -OutputRoot '${{ env.RELEASE_OUTPUT_ROOT }}'

      - name: Stage GitHub Release assets
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release-metadata.outputs.tag }}
          WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
        run: |
          ./scripts/tools/packaging/Export-GitHubReleaseAssets.ps1 `
            -InputRoot '${{ env.RELEASE_OUTPUT_ROOT }}' `
            -OutputRoot '${{ env.RELEASE_STAGING_ROOT }}' `
            -Tag $env:RELEASE_TAG `
            -TrustedSignerThumbprint $env:WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT `
            -OutputJson
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $env:RELEASE_TAG
          Copy-Item -LiteralPath 'artifacts/release/docfx-evidence.json' -Destination (Join-Path $stagingRoot 'docfx-evidence.json') -Force
          Copy-Item -LiteralPath 'artifacts/release/security-evidence.json' -Destination (Join-Path $stagingRoot 'security-evidence.json') -Force

      - name: Upload staged release bundle artifact
        if: steps.release-metadata.outputs.is-e2e-validation-release != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-release-assets-${{ steps.release-metadata.outputs.tag }}
          path: |
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/release_*_win-x64.zip
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/release_*_win-x86.zip
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/release_*_win-arm64.zip
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/SHA256SUMS.txt
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/release-assets.json
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/release-sbom.spdx.json
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/package-sbom.spdx.json
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/docfx-evidence.json
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/security-evidence.json
            ${{ env.RELEASE_STAGING_ROOT }}/${{ steps.release-metadata.outputs.tag }}/upload-gh-release.ps1

      - name: Cleanup materialized signing certificate
        if: always()
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_CERTIFICATE_PATH) -and
              (Test-Path $env:WPFDEVTOOLS_RELEASE_CERTIFICATE_PATH)) {
            Remove-Item -LiteralPath $env:WPFDEVTOOLS_RELEASE_CERTIFICATE_PATH -Force
          }

  validate-x64-release-assets:
    if: needs.publish-release-assets.outputs.is-e2e-validation-release != 'true'
    needs: publish-release-assets
    runs-on: windows-2022
    env:
      RELEASE_STAGING_ROOT: artifacts/release/github-assets
      RELEASE_TRUST_MODE: ${{ needs.publish-release-assets.outputs.release-trust-mode }}
      WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
      WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT }}

    steps:
      - name: Checkout tagged revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ needs.publish-release-assets.outputs.release-tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Download staged release bundle artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: github-release-assets-${{ needs.publish-release-assets.outputs.release-tag }}
          path: ${{ env.RELEASE_STAGING_ROOT }}/${{ needs.publish-release-assets.outputs.release-tag }}

      - name: Verify release validation signer trust
        shell: pwsh
        run: |
          if ($env:RELEASE_TRUST_MODE -eq 'Signed' -and [string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT)) {
            throw 'Release validation requires WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT.'
          }
          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            Write-Host 'Release validation is using SHA256 release metadata without Authenticode signer pinning.'
          }

      - name: Install staged x64 package smoke test
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchives = @(Get-ChildItem $stagingRoot -File -Filter 'release_*_win-x64.zip' | Sort-Object Name)
          if ($packageArchives.Count -ne 1) {
            $foundArchives = if ($packageArchives.Count -eq 0) { '<none>' } else { ($packageArchives | ForEach-Object { $_.Name }) -join ', ' }
            throw "Expected exactly one staged x64 release archive but found $($packageArchives.Count): $foundArchives"
          }
          $packageArchive = $packageArchives[0]

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -TrustedReleaseMetadataDirectory $stagingRoot -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson
          } else {
            $packageDir = Join-Path $stagingRoot $packageArchive.BaseName
            if (Test-Path $packageDir) {
              Remove-Item -LiteralPath $packageDir -Recurse -Force
            }

            Expand-Archive -LiteralPath $packageArchive.FullName -DestinationPath $packageDir -Force
            & powershell -ExecutionPolicy Bypass -File (Join-Path $packageDir 'bin/install.ps1') -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson
          }

      - name: Start staged installed x64 runtime live smoke test
        shell: pwsh
        run: |
          $serverPath = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'x64\current\bin\wpf-devtools-x64.exe'

          if (-not (Test-Path $serverPath)) {
            throw "Could not locate staged installed x64 server executable at $serverPath"
          }

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath -Architecture 'x64' -SmokeInstallMode 'package-local' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x64-installed.json'
          } else {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'x64' -SmokeInstallMode 'package-local' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x64-installed.json'
          }

      - name: x64 online installer smoke test
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchives = @(Get-ChildItem $stagingRoot -File -Filter 'release_*_win-x64.zip' | Sort-Object Name)
          if ($packageArchives.Count -ne 1) {
            $foundArchives = if ($packageArchives.Count -eq 0) { '<none>' } else { ($packageArchives | ForEach-Object { $_.Name }) -join ', ' }
            throw "Expected exactly one staged x64 release archive but found $($packageArchives.Count): $foundArchives"
          }
          $packageArchive = $packageArchives[0]

          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -TrustedReleaseMetadataDirectory $stagingRoot -InstallRoot './tmp-release-bootstrap-smoke' -Client other -NonInteractive -Force -OutputJson

      - name: Start staged online-installed x64 runtime live smoke test
        shell: pwsh
        run: |
          $serverPath = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'x64\current\bin\wpf-devtools-x64.exe'

          if (-not (Test-Path $serverPath)) {
            throw "Could not locate staged online-installed x64 server executable at $serverPath"
          }

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath -Architecture 'x64' -SmokeInstallMode 'online-installer' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x64-online.json'
          } else {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'x64' -SmokeInstallMode 'online-installer' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x64-online.json'
          }

      - name: Uninstall staged installed x64 package smoke test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          $installedScript = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'x64\current\bin\install.ps1'

          if (-not (Test-Path $installedScript)) {
            throw "Could not locate installed package-local installer at $installedScript"
          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'x64' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged installed x64 package residue test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -Action full-uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'x64' -Client other -NonInteractive -OutputJson
          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-InstallResidue.ps1 -InstallRoot './tmp-release-install-smoke' -Architecture 'x64'

      - name: Uninstall staged x64 online installer smoke test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          $installedScript = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'x64\current\bin\install.ps1'

          if (-not (Test-Path $installedScript)) {
            throw "Could not locate installed online-installer payload at $installedScript"
          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'x64' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged x64 online installer residue test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -Action full-uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'x64' -Client other -NonInteractive -OutputJson
          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-InstallResidue.ps1 -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'x64'

      - name: Upload x64 runtime evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-runtime-evidence-${{ needs.publish-release-assets.outputs.release-tag }}-x64
          path: artifacts/release/runtime-evidence-x64-*.json

  validate-x86-release-assets:
    if: needs.publish-release-assets.outputs.is-e2e-validation-release != 'true'
    needs: publish-release-assets
    runs-on: windows-2022
    env:
      RELEASE_STAGING_ROOT: artifacts/release/github-assets
      RELEASE_TRUST_MODE: ${{ needs.publish-release-assets.outputs.release-trust-mode }}
      WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
      WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT }}

    steps:
      - name: Checkout tagged revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ needs.publish-release-assets.outputs.release-tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'
          architecture: x86

      - name: Download staged release bundle artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: github-release-assets-${{ needs.publish-release-assets.outputs.release-tag }}
          path: ${{ env.RELEASE_STAGING_ROOT }}/${{ needs.publish-release-assets.outputs.release-tag }}

      - name: Verify release validation signer trust
        shell: pwsh
        run: |
          if ($env:RELEASE_TRUST_MODE -eq 'Signed' -and [string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT)) {
            throw 'Release validation requires WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT.'
          }
          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            Write-Host 'Release validation is using SHA256 release metadata without Authenticode signer pinning.'
          }

      - name: Install staged x86 package smoke test
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchives = @(Get-ChildItem $stagingRoot -File -Filter 'release_*_win-x86.zip' | Sort-Object Name)
          if ($packageArchives.Count -ne 1) {
            $foundArchives = if ($packageArchives.Count -eq 0) { '<none>' } else { ($packageArchives | ForEach-Object { $_.Name }) -join ', ' }
            throw "Expected exactly one staged x86 release archive but found $($packageArchives.Count): $foundArchives"
          }
          $packageArchive = $packageArchives[0]

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -TrustedReleaseMetadataDirectory $stagingRoot -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson
          } else {
            $packageDir = Join-Path $stagingRoot $packageArchive.BaseName
            if (Test-Path $packageDir) {
              Remove-Item -LiteralPath $packageDir -Recurse -Force
            }

            Expand-Archive -LiteralPath $packageArchive.FullName -DestinationPath $packageDir -Force
            & powershell -ExecutionPolicy Bypass -File (Join-Path $packageDir 'bin/install.ps1') -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson
          }

      - name: Start staged installed x86 runtime live smoke test
        shell: pwsh
        run: |
          $serverPath = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'x86\current\bin\wpf-devtools-x86.exe'

          if (-not (Test-Path $serverPath)) {
            throw "Could not locate staged installed x86 server executable at $serverPath"
          }

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath -Architecture 'x86' -SmokeInstallMode 'package-local' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x86-installed.json'
          } else {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'x86' -SmokeInstallMode 'package-local' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x86-installed.json'
          }

      - name: x86 online installer smoke test
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchives = @(Get-ChildItem $stagingRoot -File -Filter 'release_*_win-x86.zip' | Sort-Object Name)
          if ($packageArchives.Count -ne 1) {
            $foundArchives = if ($packageArchives.Count -eq 0) { '<none>' } else { ($packageArchives | ForEach-Object { $_.Name }) -join ', ' }
            throw "Expected exactly one staged x86 release archive but found $($packageArchives.Count): $foundArchives"
          }
          $packageArchive = $packageArchives[0]

          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -TrustedReleaseMetadataDirectory $stagingRoot -InstallRoot './tmp-release-bootstrap-smoke' -Client other -NonInteractive -Force -OutputJson

      - name: Start staged online-installed x86 runtime live smoke test
        shell: pwsh
        run: |
          $serverPath = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'x86\current\bin\wpf-devtools-x86.exe'

          if (-not (Test-Path $serverPath)) {
            throw "Could not locate staged online-installed x86 server executable at $serverPath"
          }

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath -Architecture 'x86' -SmokeInstallMode 'online-installer' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x86-online.json'
          } else {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'x86' -SmokeInstallMode 'online-installer' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x86-online.json'
          }

      - name: Uninstall staged installed x86 package smoke test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          $installedScript = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'x86\current\bin\install.ps1'

          if (-not (Test-Path $installedScript)) {
            throw "Could not locate installed package-local installer at $installedScript"
          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'x86' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged installed x86 package residue test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -Action full-uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'x86' -Client other -NonInteractive -OutputJson
          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-InstallResidue.ps1 -InstallRoot './tmp-release-install-smoke' -Architecture 'x86'

      - name: Uninstall staged x86 online installer smoke test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          $installedScript = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'x86\current\bin\install.ps1'

          if (-not (Test-Path $installedScript)) {
            throw "Could not locate installed online-installer payload at $installedScript"
          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'x86' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged x86 online installer residue test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -Action full-uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'x86' -Client other -NonInteractive -OutputJson
          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-InstallResidue.ps1 -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'x86'

      - name: Upload x86 runtime evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-runtime-evidence-${{ needs.publish-release-assets.outputs.release-tag }}-x86
          path: artifacts/release/runtime-evidence-x86-*.json

  validate-arm64-release-assets:
    if: needs.publish-release-assets.outputs.is-e2e-validation-release != 'true' && needs.publish-release-assets.outputs.is-prerelease-release == 'true' && vars.WPFDEVTOOLS_ENABLE_ARM64_RUNTIME_SMOKE == 'true'
    needs: publish-release-assets
    runs-on: [self-hosted, Windows, ARM64]
    env:
      RELEASE_STAGING_ROOT: artifacts/release/github-assets
      RELEASE_TRUST_MODE: ${{ needs.publish-release-assets.outputs.release-trust-mode }}
      WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
      WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_SUBJECT }}

    steps:
      - name: Checkout tagged revision
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ needs.publish-release-assets.outputs.release-tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
