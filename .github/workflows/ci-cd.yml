name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64, x86]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Resolve native host SDK paths
      shell: pwsh
      run: |
        $rid = switch ('${{ matrix.platform }}') {
          'x64' { 'win-x64' }
          'x86' { 'win-x86' }
          default { throw "Unsupported bootstrapper platform: ${{ matrix.platform }}" }
        }

        $packRoot = Join-Path $env:ProgramFiles 'dotnet\packs'
        $packDir = Get-ChildItem (Join-Path $packRoot "Microsoft.NETCore.App.Host.$rid") -Directory |
          Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1

        if (-not $packDir) {
          throw "Could not locate Microsoft.NETCore.App.Host pack for $rid"
        }

        $nativeDir = Join-Path $packDir.FullName "runtimes\$rid\native"
        if (-not (Test-Path $nativeDir)) {
          throw "Could not locate native host directory: $nativeDir"
        }

        "BOOTSTRAPPER_NATIVE_DIR=$nativeDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Build native bootstrapper
      shell: pwsh
      run: |
        $platform = switch ('${{ matrix.platform }}') {
          'x86' { 'Win32' }
          'x64' { 'x64' }
          default { throw "Unsupported bootstrapper platform: ${{ matrix.platform }}" }
        }

        & msbuild src/WpfDevTools.Bootstrapper/WpfDevTools.Bootstrapper.vcxproj `
          /m `
          /nologo `
          "/p:Configuration=${{ matrix.configuration }}" `
          "/p:Platform=$platform" `
          "/p:NetHostIncludeDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:NetHostLibDir=$env:BOOTSTRAPPER_NATIVE_DIR"

    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore -p:Platform=${{ matrix.platform }} -nodeReuse:false -p:UseSharedCompilation=false

    - name: Run tests
      run: dotnet test --configuration ${{ matrix.configuration }} --no-build --verbosity normal -p:Platform=${{ matrix.platform }}

    - name: Upload build artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: wpf-devtools-mcp-${{ matrix.platform }}
        path: |
          src/WpfDevTools.Mcp.Server/bin/Release/net8.0/
          src/WpfDevTools.Inspector/bin/Release/net8.0-windows/
          src/WpfDevTools.Inspector.Sdk/bin/Release/net8.0-windows/

  build-arm64:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Build ARM64 (cross-compile, no test - no ARM64 runner available)
      run: dotnet build --configuration Release -p:Platform=ARM64 -nodeReuse:false -p:UseSharedCompilation=false

  release-packaging-smoke:
    runs-on: windows-latest
    env:
      WPFDEVTOOLS_INSTALLER_TEST_MODE: '1'
      WPFDEVTOOLS_TEST_TRUST_LOCAL_ARCHIVE_RELEASE_METADATA: '1'
      WPFDEVTOOLS_TEST_SIGNATURE_STATUS: 'Valid'

    strategy:
      matrix:
        architecture: [x64, x86]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Run release packaging smoke test
      shell: pwsh
      run: |
        & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Publish-Release.ps1 -Architectures '${{ matrix.architecture }}'

    - name: Install published package smoke test
      shell: pwsh
      run: |
        $packageDir = Get-ChildItem 'artifacts/release' -Directory -Filter "release_*_win-${{ matrix.architecture }}" |
          Sort-Object Name -Descending |
          Select-Object -First 1

        if ($null -eq $packageDir) {
          throw "Could not locate packaged release directory for architecture ${{ matrix.architecture }}"
        }

        & powershell -ExecutionPolicy Bypass -File (Join-Path $packageDir.FullName 'bin/install.ps1') -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson

    - name: Start installed package runtime smoke test
      shell: pwsh
      run: |
        $serverPath = Join-Path (Resolve-Path './tmp-release-install-smoke').Path '${{ matrix.architecture }}\current\bin\wpf-devtools-${{ matrix.architecture }}.exe'

        if (-not (Test-Path $serverPath)) {
          throw "Could not locate installed server executable at $serverPath"
        }

        & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath

    - name: Online installer smoke test
      shell: pwsh
      run: |
        $packageArchive = Get-ChildItem 'artifacts/release' -File -Filter "release_*_win-${{ matrix.architecture }}.zip" |
          Sort-Object Name -Descending |
          Select-Object -First 1

        if ($null -eq $packageArchive) {
          throw "Could not locate packaged release archive for architecture ${{ matrix.architecture }}"
        }

        & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -InstallRoot './tmp-release-bootstrap-smoke' -Client other -NonInteractive -Force -OutputJson

    - name: Start online-installed runtime smoke test
      shell: pwsh
      run: |
        $serverPath = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path '${{ matrix.architecture }}\current\bin\wpf-devtools-${{ matrix.architecture }}.exe'

        if (-not (Test-Path $serverPath)) {
          throw "Could not locate online-installed server executable at $serverPath"
        }

        & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath

    - name: Uninstall published package smoke test
      shell: pwsh
      run: |
        $installedScript = Join-Path (Resolve-Path './tmp-release-install-smoke').Path '${{ matrix.architecture }}\current\bin\install.ps1'

        if (-not (Test-Path $installedScript)) {
          throw "Could not locate installed package-local installer at $installedScript"
        }

        & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-install-smoke' -Architecture '${{ matrix.architecture }}' -Client other -NonInteractive -OutputJson

    - name: Uninstall online installer smoke test
      shell: pwsh
      run: |
        $installedScript = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path '${{ matrix.architecture }}\current\bin\install.ps1'

        if (-not (Test-Path $installedScript)) {
          throw "Could not locate installed online-installer payload at $installedScript"
        }

        & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture '${{ matrix.architecture }}' -Client other -NonInteractive -OutputJson

  release-packaging-smoke-arm64:
    if: vars.WPFDEVTOOLS_ENABLE_ARM64_RUNTIME_SMOKE == 'true'
    runs-on: [self-hosted, Windows, ARM64]
    env:
      WPFDEVTOOLS_INSTALLER_TEST_MODE: '1'
      WPFDEVTOOLS_TEST_TRUST_LOCAL_ARCHIVE_RELEASE_METADATA: '1'
      WPFDEVTOOLS_TEST_SIGNATURE_STATUS: 'Valid'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Run ARM64 release packaging smoke test
      shell: pwsh
      run: |
        & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Publish-Release.ps1 -Architectures 'arm64'

    - name: Install published ARM64 package smoke test
      shell: pwsh
      run: |
        $packageDir = Get-ChildItem 'artifacts/release' -Directory -Filter 'release_*_win-arm64' |
          Sort-Object Name -Descending |
          Select-Object -First 1

        if ($null -eq $packageDir) {
          throw 'Could not locate packaged release directory for architecture arm64'
        }

        & powershell -ExecutionPolicy Bypass -File (Join-Path $packageDir.FullName 'bin/install.ps1') -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson

    - name: Start installed ARM64 runtime smoke test
      shell: pwsh
      run: |
        $serverPath = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'arm64\current\bin\wpf-devtools-arm64.exe'

        if (-not (Test-Path $serverPath)) {
          throw "Could not locate installed ARM64 server executable at $serverPath"
        }

        & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath

    - name: ARM64 online installer smoke test
      shell: pwsh
      run: |
        $packageArchive = Get-ChildItem 'artifacts/release' -File -Filter 'release_*_win-arm64.zip' |
          Sort-Object Name -Descending |
          Select-Object -First 1

        if ($null -eq $packageArchive) {
          throw 'Could not locate packaged release archive for architecture arm64'
        }

        & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -InstallRoot './tmp-release-bootstrap-smoke' -Client other -NonInteractive -Force -OutputJson

    - name: Start online-installed ARM64 runtime smoke test
      shell: pwsh
      run: |
        $serverPath = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'arm64\current\bin\wpf-devtools-arm64.exe'

        if (-not (Test-Path $serverPath)) {
          throw "Could not locate online-installed ARM64 server executable at $serverPath"
        }

        & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath

    - name: Uninstall published ARM64 package smoke test
      shell: pwsh
      run: |
        $installedScript = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'arm64\current\bin\install.ps1'

        if (-not (Test-Path $installedScript)) {
          throw "Could not locate installed package-local installer at $installedScript"
        }

        & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'arm64' -Client other -NonInteractive -OutputJson

    - name: Uninstall ARM64 online installer smoke test
      shell: pwsh
      run: |
        $installedScript = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'arm64\current\bin\install.ps1'

        if (-not (Test-Path $installedScript)) {
          throw "Could not locate installed online-installer payload at $installedScript"
        }

        & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'arm64' -Client other -NonInteractive -OutputJson
  code-coverage:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Resolve native host SDK paths
      shell: pwsh
      run: |
        $rid = 'win-x64'
        $packRoot = Join-Path $env:ProgramFiles 'dotnet\packs'
        $packDir = Get-ChildItem (Join-Path $packRoot "Microsoft.NETCore.App.Host.$rid") -Directory |
          Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1

        if (-not $packDir) {
          throw "Could not locate Microsoft.NETCore.App.Host pack for $rid"
        }

        $nativeDir = Join-Path $packDir.FullName "runtimes\$rid\native"
        if (-not (Test-Path $nativeDir)) {
          throw "Could not locate native host directory: $nativeDir"
        }

        "BOOTSTRAPPER_NATIVE_DIR=$nativeDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Build native bootstrapper
      shell: pwsh
      run: |
        & msbuild src/WpfDevTools.Bootstrapper/WpfDevTools.Bootstrapper.vcxproj `
          /m `
          /nologo `
          "/p:Configuration=Debug" `
          "/p:Platform=x64" `
          "/p:NetHostIncludeDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:NetHostLibDir=$env:BOOTSTRAPPER_NATIVE_DIR"

    - name: Build unit tests for coverage
      run: dotnet build tests/WpfDevTools.Tests.Unit/WpfDevTools.Tests.Unit.csproj -c Debug --no-restore -nodeReuse:false -p:UseSharedCompilation=false

    - name: Run tests with coverage
      run: dotnet test tests/WpfDevTools.Tests.Unit/WpfDevTools.Tests.Unit.csproj -c Debug --no-build --settings coverlet.runsettings --collect:"XPlat Code Coverage" --results-directory ./TestResults -nodeReuse:false -p:UseSharedCompilation=false

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: ./TestResults
        flags: unittests
        name: codecov-wpf-devtools

  build-nuget:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Build SDK package
      run: dotnet pack src/WpfDevTools.Inspector.Sdk/WpfDevTools.Inspector.Sdk.csproj --configuration Release --output ./nupkg

    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./nupkg/*.nupkg
