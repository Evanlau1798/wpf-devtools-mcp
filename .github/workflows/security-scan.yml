name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

    - name: Resolve native host SDK paths
      shell: pwsh
      run: |
        $rid = 'win-x64'
        $packRoot = Join-Path $env:ProgramFiles 'dotnet\packs'
        $packDir = Get-ChildItem (Join-Path $packRoot "Microsoft.NETCore.App.Host.$rid") -Directory |
          Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1

        if (-not $packDir) {
          throw "Could not locate Microsoft.NETCore.App.Host pack for $rid"
        }

        $nativeDir = Join-Path $packDir.FullName "runtimes\$rid\native"
        if (-not (Test-Path $nativeDir)) {
          throw "Could not locate native host directory: $nativeDir"
        }

        "BOOTSTRAPPER_NATIVE_DIR=$nativeDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Restore dependencies
      run: dotnet restore --locked-mode -p:NuGetAudit=true

    - name: Run .NET analyzer gate
      shell: pwsh
      run: |
        ./scripts/tools/security/Invoke-DotNetAnalyzerGate.ps1

    - name: Run PowerShell ScriptAnalyzer
      shell: pwsh
      run: |
        # Install pinned PSScriptAnalyzer without permanently trusting PSGallery.
        ./scripts/tools/security/Install-PowerShellScriptAnalyzer.ps1 -RequiredVersion 1.25.0

        ./scripts/tools/security/Invoke-PowerShellScriptAnalyzerGate.ps1 -Path 'scripts' -Severity Error

    - name: Run repository secret pattern scan
      shell: pwsh
      run: |
        ./scripts/tools/security/Invoke-RepositorySecretScan.ps1

    - name: Run Composer pack fixture policy scan
      shell: pwsh
      run: |
        $sourceLockPath = 'packs/builtin/wpfui/0.1.0/source.lock.json'
        $sourceLock = Get-Content -LiteralPath $sourceLockPath -Raw | ConvertFrom-Json
        $allowedLicenses = @('MIT')

        foreach ($source in @($sourceLock.sources)) {
          if ($allowedLicenses -notcontains [string]$source.license) {
            throw "Composer pack source uses an unapproved license: $($source.license)"
          }

          if ([string]::IsNullOrWhiteSpace([string]$source.url) -or
              [string]::IsNullOrWhiteSpace([string]$source.version)) {
            throw "Composer pack source provenance is incomplete in $sourceLockPath"
          }

          $localPath = [string]$source.localPath
          if ($localPath -match '^[A-Za-z]:[\\/]' -or $localPath.StartsWith('\\') -or $localPath.StartsWith('/')) {
            throw "Composer pack source uses a local absolute path: $localPath"
          }
        }

        $packRoot = 'packs/builtin/wpfui/0.1.0'
        $baselineArchivePath = 'packs/baselines/wpfui/0.1.0/archives/wpfui-0.1.0.zip'
        $archivePrefix = 'wpfui/0.1.0/'
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        function Get-NormalizedTextSha256 {
          param(
            [System.Security.Cryptography.HashAlgorithm]$Algorithm,
            [System.IO.Stream]$Stream
          )

          $reader = [System.IO.StreamReader]::new($Stream, [System.Text.Encoding]::UTF8, $true)
          try {
            $text = $reader.ReadToEnd()
          }
          finally {
            $reader.Dispose()
          }

          $normalizedText = $text.Replace("`r`n", "`n").Replace("`r", "`n")
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($normalizedText)
          [System.Convert]::ToBase64String($Algorithm.ComputeHash($bytes))
        }

        $packRootPath = (Resolve-Path -LiteralPath $packRoot).Path
        $packFiles = @(Get-ChildItem -LiteralPath $packRootPath -Recurse -File)
        if ($packFiles.Count -eq 0) {
          throw 'Composer built-in pack fixture did not contain generated artifacts.'
        }

        $packRootPrefix = $packRootPath.TrimEnd(
          [System.IO.Path]::DirectorySeparatorChar,
          [System.IO.Path]::AltDirectorySeparatorChar) + [System.IO.Path]::DirectorySeparatorChar
        $relativePackPaths = @($packFiles | ForEach-Object {
          if (-not $_.FullName.StartsWith($packRootPrefix, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Composer pack fixture file is outside expected root: $($_.FullName)"
          }

          $_.FullName.Substring($packRootPrefix.Length).Replace('\', '/')
        } | Sort-Object)
        $archive = [System.IO.Compression.ZipFile]::OpenRead($baselineArchivePath)
        try {
          $archiveEntries = @($archive.Entries | Where-Object { -not [string]::IsNullOrEmpty($_.Name) })
          $relativeArchivePaths = @($archiveEntries | ForEach-Object {
            if (-not $_.FullName.StartsWith($archivePrefix, [System.StringComparison]::Ordinal)) {
              throw "Composer baseline archive entry is outside expected prefix: $($_.FullName)"
            }

            $_.FullName.Substring($archivePrefix.Length)
          } | Sort-Object)

          $fileSetDiff = @(Compare-Object -ReferenceObject $relativeArchivePaths -DifferenceObject $relativePackPaths)
          if ($fileSetDiff.Count -ne 0) {
            throw 'Composer pack fixture file set does not match the reviewed baseline archive.'
          }

          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          try {
            foreach ($entry in $archiveEntries) {
              $relativePath = $entry.FullName.Substring($archivePrefix.Length)
              $packPath = Join-Path $packRootPath $relativePath.Replace('/', [System.IO.Path]::DirectorySeparatorChar)

              $entryStream = $entry.Open()
              try {
                $archiveHash = Get-NormalizedTextSha256 -Algorithm $sha256 -Stream $entryStream
              }
              finally {
                $entryStream.Dispose()
              }

              $packStream = [System.IO.File]::OpenRead((Resolve-Path -LiteralPath $packPath).Path)
              try {
                $packHash = Get-NormalizedTextSha256 -Algorithm $sha256 -Stream $packStream
              }
              finally {
                $packStream.Dispose()
              }

              if ($archiveHash -ne $packHash) {
                throw "Composer pack fixture file hash mismatch: $relativePath"
              }
            }
          }
          finally {
            $sha256.Dispose()
          }
        }
        finally {
          $archive.Dispose()
        }

    - name: Run native bootstrapper security analysis
      shell: pwsh
      run: |
        & msbuild src/WpfDevTools.Bootstrapper/WpfDevTools.Bootstrapper.vcxproj `
          /m `
          /nologo `
          "/p:Configuration=Release" `
          "/p:Platform=x64" `
          "/p:PreferredToolArchitecture=x64" `
          "/p:LinkIncremental=false" `
          "/p:NetHostIncludeDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:NetHostLibDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:RunCodeAnalysis=true" `
          "/p:TreatWarningsAsErrors=true"
