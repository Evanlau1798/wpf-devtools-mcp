name: Publish Docs

on:
  push:
    branches: [ master, main ]
    paths:
      - '.github/workflows/docs-pages.yml'
      - '.config/dotnet-tools.json'
      - 'docfx/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'EXAMPLES.md'
      - 'src/WpfDevTools.Shared/**'
      - 'src/WpfDevTools.Inspector.Sdk/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore project dependencies
        run: dotnet restore WpfDevTools.sln --locked-mode

      - name: Build shared assembly for API docs
        run: dotnet build src/WpfDevTools.Shared/WpfDevTools.Shared.csproj -c Debug -f net8.0

      - name: Build SDK assembly for API docs
        run: dotnet build src/WpfDevTools.Inspector.Sdk/WpfDevTools.Inspector.Sdk.csproj -c Debug -f net8.0-windows

      - name: Build DocFX site
        run: dotnet tool run docfx docfx/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: docfx/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
