          dotnet-version: '8.0.x'

      - name: Download staged release bundle artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: github-release-assets-${{ needs.publish-release-assets.outputs.release-tag }}
          path: ${{ env.RELEASE_STAGING_ROOT }}/${{ needs.publish-release-assets.outputs.release-tag }}

      - name: Verify release validation signer trust
        shell: pwsh
        run: |
          if ($env:RELEASE_TRUST_MODE -eq 'Signed' -and [string]::IsNullOrWhiteSpace($env:WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT)) {
            throw 'Release validation requires WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT.'
          }
          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            Write-Host 'Release validation is using SHA256 release metadata without Authenticode signer pinning.'
          }

      - name: Install staged ARM64 package smoke test
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchives = @(Get-ChildItem $stagingRoot -File -Filter 'release_*_win-arm64.zip' | Sort-Object Name)
          if ($packageArchives.Count -ne 1) {
            $foundArchives = if ($packageArchives.Count -eq 0) { '<none>' } else { ($packageArchives | ForEach-Object { $_.Name }) -join ', ' }
            throw "Expected exactly one staged arm64 release archive but found $($packageArchives.Count): $foundArchives"
          }
          $packageArchive = $packageArchives[0]

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -TrustedReleaseMetadataDirectory $stagingRoot -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson
          } else {
            $packageDir = Join-Path $stagingRoot $packageArchive.BaseName
            if (Test-Path $packageDir) {
              Remove-Item -LiteralPath $packageDir -Recurse -Force
            }

            Expand-Archive -LiteralPath $packageArchive.FullName -DestinationPath $packageDir -Force
            & powershell -ExecutionPolicy Bypass -File (Join-Path $packageDir 'bin/install.ps1') -InstallRoot './tmp-release-install-smoke' -Client other -NonInteractive -Force -OutputJson
          }

      - name: Start staged installed ARM64 runtime smoke test
        shell: pwsh
        run: |
          $serverPath = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'arm64\current\bin\wpf-devtools-arm64.exe'

          if (-not (Test-Path $serverPath)) {
            throw "Could not locate staged installed ARM64 server executable at $serverPath"
          }

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath -Architecture 'arm64' -SmokeInstallMode 'package-local' -EvidenceOutputPath 'artifacts/release/runtime-evidence-arm64-installed.json'
          } else {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'arm64' -SmokeInstallMode 'package-local' -EvidenceOutputPath 'artifacts/release/runtime-evidence-arm64-installed.json'
          }

      - name: ARM64 online installer smoke test
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchives = @(Get-ChildItem $stagingRoot -File -Filter 'release_*_win-arm64.zip' | Sort-Object Name)
          if ($packageArchives.Count -ne 1) {
            $foundArchives = if ($packageArchives.Count -eq 0) { '<none>' } else { ($packageArchives | ForEach-Object { $_.Name }) -join ', ' }
            throw "Expected exactly one staged arm64 release archive but found $($packageArchives.Count): $foundArchives"
          }
          $packageArchive = $packageArchives[0]

          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -TrustedReleaseMetadataDirectory $stagingRoot -InstallRoot './tmp-release-bootstrap-smoke' -Client other -NonInteractive -Force -OutputJson

      - name: Start staged online-installed ARM64 runtime smoke test
        shell: pwsh
        run: |
          $serverPath = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'arm64\current\bin\wpf-devtools-arm64.exe'

          if (-not (Test-Path $serverPath)) {
            throw "Could not locate staged online-installed ARM64 server executable at $serverPath"
          }

          if ($env:RELEASE_TRUST_MODE -eq 'ReleaseChecksumOnly') {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-PackagedServerRuntime.ps1 -ServerPath $serverPath -Architecture 'arm64' -SmokeInstallMode 'online-installer' -EvidenceOutputPath 'artifacts/release/runtime-evidence-arm64-online.json'
          } else {
            & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'arm64' -SmokeInstallMode 'online-installer' -EvidenceOutputPath 'artifacts/release/runtime-evidence-arm64-online.json'
          }

      - name: Uninstall staged installed ARM64 package smoke test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          $installedScript = Join-Path (Resolve-Path './tmp-release-install-smoke').Path 'arm64\current\bin\install.ps1'

          if (-not (Test-Path $installedScript)) {
            throw "Could not locate installed package-local installer at $installedScript"
          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'arm64' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged installed ARM64 package residue test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\install\AppData\Local
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -Action full-uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'arm64' -Client other -NonInteractive -OutputJson
          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-InstallResidue.ps1 -InstallRoot './tmp-release-install-smoke' -Architecture 'arm64'

      - name: Uninstall staged ARM64 online installer smoke test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          $installedScript = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'arm64\current\bin\install.ps1'

          if (-not (Test-Path $installedScript)) {
            throw "Could not locate installed online-installer payload at $installedScript"
          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'arm64' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged ARM64 online installer residue test
        shell: pwsh
        env:
          APPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Roaming
          LOCALAPPDATA: ${{ github.workspace }}\tmp-release-user-smoke\bootstrap\AppData\Local
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -Action full-uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'arm64' -Client other -NonInteractive -OutputJson
          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-InstallResidue.ps1 -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'arm64'

      - name: Upload ARM64 runtime evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-runtime-evidence-${{ needs.publish-release-assets.outputs.release-tag }}-arm64
          path: artifacts/release/runtime-evidence-arm64-*.json

  upload-release-assets:
    if: always() && needs.publish-release-assets.outputs.is-e2e-validation-release != 'true' && needs.publish-release-assets.result == 'success' && needs.validate-x64-release-assets.result == 'success' && needs.validate-x86-release-assets.result == 'success' && (needs.validate-arm64-release-assets.result == 'success' || needs.validate-arm64-release-assets.result == 'skipped')
    needs:
      - publish-release-assets
      - validate-x64-release-assets
      - validate-x86-release-assets
      - validate-arm64-release-assets
    permissions:
      contents: write
    runs-on: windows-2022
    env:
      RELEASE_STAGING_ROOT: artifacts/release/github-assets

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Download staged release bundle artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: github-release-assets-${{ needs.publish-release-assets.outputs.release-tag }}
          path: ${{ env.RELEASE_STAGING_ROOT }}/${{ needs.publish-release-assets.outputs.release-tag }}

      - name: Download runtime evidence artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-runtime-evidence-${{ needs.publish-release-assets.outputs.release-tag }}-*
          path: artifacts/release/runtime-evidence
          merge-multiple: true

      - name: Write release evidence summary
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
          ARM64_VALIDATION_RESULT: ${{ needs.validate-arm64-release-assets.result }}
          WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT: ${{ secrets.WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT }}
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $runtimeEvidence = @(Get-ChildItem 'artifacts/release/runtime-evidence' -File -Filter 'runtime-evidence-*.json' | Sort-Object Name | ForEach-Object { $_.FullName })
          if ($runtimeEvidence.Count -eq 0) {
            throw 'No runtime evidence artifacts were downloaded for release evidence summary.'
          }
          $runtimeEvidenceCsv = $runtimeEvidence -join ','
          $runnerMatrix = 'windows-x64,windows-x86'
          if ($env:ARM64_VALIDATION_RESULT -eq 'success') {
            $runnerMatrix += ',windows-arm64'
          }

          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Write-ReleaseEvidence.ps1 `
            -OutputPath (Join-Path $stagingRoot 'release-evidence.json') `
            -Repository '${{ github.repository }}' `
            -Branch $tag `
            -CommitSha '${{ needs.publish-release-assets.outputs.tag-commit-sha }}' `
            -WorkflowRunId '${{ github.run_id }}' `
            -RunnerMatrix $runnerMatrix `
            -RuntimeEvidencePath $runtimeEvidenceCsv `
            -DocFxEvidencePath (Join-Path $stagingRoot 'docfx-evidence.json') `
            -SecurityEvidencePath (Join-Path $stagingRoot 'security-evidence.json') `
            -Sha256SumsPath (Join-Path $stagingRoot 'SHA256SUMS.txt') `
            -ReleaseAssetsPath (Join-Path $stagingRoot 'release-assets.json') `
            -ReleaseSbomPath (Join-Path $stagingRoot 'release-sbom.spdx.json') `
            -PackageSbomPath (Join-Path $stagingRoot 'package-sbom.spdx.json') `
            -DotnetSdkVersion (dotnet --version) `
            -PowerShellVersion $PSVersionTable.PSVersion.ToString() `
            -WorkflowSha '${{ github.workflow_sha }}' `
            -TrustedSignerThumbprint $env:WPFDEVTOOLS_RELEASE_SIGNER_THUMBPRINT `
            -UninstallResiduePassed `
            -PublicReleaseStrict

          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Test-ReleaseEvidenceSchema.ps1 `
            -EvidencePath (Join-Path $stagingRoot 'release-evidence.json')

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-evidence-${{ needs.publish-release-assets.outputs.release-tag }}
          path: ${{ env.RELEASE_STAGING_ROOT }}/${{ needs.publish-release-assets.outputs.release-tag }}/release-evidence.json

      - name: Ensure GitHub Release exists for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
        run: |
          $tag = $env:RELEASE_TAG
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated release asset upload for $tag."
          }

      - name: Upload staged assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
        run: |
          $tag = $env:RELEASE_TAG
          Set-Location (Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag)
          ./upload-gh-release.ps1 -ReleaseTag $tag
