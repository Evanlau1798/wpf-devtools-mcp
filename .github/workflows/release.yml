          }

          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'x86' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x86-installed.json'

      - name: x86 online installer smoke test
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchive = Get-ChildItem $stagingRoot -File -Filter 'release_*_win-x86.zip' |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if ($null -eq $packageArchive) {
            throw 'Could not locate staged x86 release archive for online installer validation.'
          }

          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -PackageArchivePath $packageArchive.FullName -TrustedReleaseMetadataDirectory $stagingRoot -InstallRoot './tmp-release-bootstrap-smoke' -Client other -NonInteractive -Force -OutputJson

      - name: Start staged online-installed x86 runtime live smoke test
        shell: pwsh
        run: |
          $serverPath = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'x86\current\bin\wpf-devtools-x86.exe'

          if (-not (Test-Path $serverPath)) {
            throw "Could not locate staged online-installed x86 server executable at $serverPath"
          }

          & powershell -ExecutionPolicy Bypass -File scripts/tools/packaging/Invoke-PackagedRuntimeLiveSmoke.ps1 -ServerPath $serverPath -Architecture 'x86' -EvidenceOutputPath 'artifacts/release/runtime-evidence-x86-online.json'

      - name: Uninstall staged installed x86 package smoke test
        shell: pwsh
        run: |
