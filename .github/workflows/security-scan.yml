name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: windows-2022

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

    - name: Resolve native host SDK paths
      shell: pwsh
      run: |
        $rid = 'win-x64'
        $packRoot = Join-Path $env:ProgramFiles 'dotnet\packs'
        $packDir = Get-ChildItem (Join-Path $packRoot "Microsoft.NETCore.App.Host.$rid") -Directory |
          Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1

        if (-not $packDir) {
          throw "Could not locate Microsoft.NETCore.App.Host pack for $rid"
        }

        $nativeDir = Join-Path $packDir.FullName "runtimes\$rid\native"
        if (-not (Test-Path $nativeDir)) {
          throw "Could not locate native host directory: $nativeDir"
        }

        "BOOTSTRAPPER_NATIVE_DIR=$nativeDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Restore dependencies
      run: dotnet restore --locked-mode

    - name: Run .NET analyzer gate
      run: dotnet format WpfDevTools.sln analyzers --verify-no-changes --severity error --no-restore

    - name: Run PowerShell ScriptAnalyzer
      shell: pwsh
      run: |
        Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
        Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -RequiredVersion 1.25.0 -Repository PSGallery

        $results = Invoke-ScriptAnalyzer -Path 'scripts' -Recurse -Severity Error
        if ($results) {
          $results | Format-Table -AutoSize | Out-String | Write-Error
          exit 1
        }

    - name: Run repository secret pattern scan
      shell: pwsh
      run: |
        $patterns = [ordered]@{
          'private-key-block' = '-----BEGIN (RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'
          'github-token' = 'gh[pousr]_[A-Za-z0-9_]{36,}'
          'aws-access-key-id' = 'AKIA[0-9A-Z]{16}'
          'slack-token' = 'xox[baprs]-[A-Za-z0-9-]{20,}'
          'openai-api-key' = 'sk-(proj-)?[A-Za-z0-9_-]{32,}'
          'azure-storage-connection-string' = 'DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{40,}'
        }

        $findings = [System.Collections.Generic.List[string]]::new()
        foreach ($path in git ls-files) {
          $fullPath = Join-Path $PWD $path
          if (-not (Test-Path -LiteralPath $fullPath -PathType Leaf)) {
            continue
          }

          try {
            $content = Get-Content -LiteralPath $fullPath -Raw -ErrorAction Stop
          }
          catch {
            continue
          }

          foreach ($entry in $patterns.GetEnumerator()) {
            if ($content -match $entry.Value) {
              $findings.Add("$path matched $($entry.Key)")
            }
          }
        }

        if ($findings.Count -gt 0) {
          $findings | Sort-Object | ForEach-Object { Write-Error $_ }
          exit 1
        }

    - name: Run native bootstrapper security analysis
      shell: pwsh
      run: |
        & msbuild src/WpfDevTools.Bootstrapper/WpfDevTools.Bootstrapper.vcxproj `
          /m `
          /nologo `
          "/p:Configuration=Release" `
          "/p:Platform=x64" `
          "/p:LinkIncremental=false" `
          "/p:NetHostIncludeDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:NetHostLibDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
          "/p:RunCodeAnalysis=true" `
          "/p:TreatWarningsAsErrors=true"
