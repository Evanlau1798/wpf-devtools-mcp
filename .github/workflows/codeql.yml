name: CodeQL

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: windows-2022
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
          - language: c-cpp

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

    - name: Resolve native host SDK paths
      shell: pwsh
      run: |
        $rid = 'win-x64'
        $packRoot = Join-Path $env:ProgramFiles 'dotnet\packs'
        $packDir = Get-ChildItem (Join-Path $packRoot "Microsoft.NETCore.App.Host.$rid") -Directory |
          Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1

        if (-not $packDir) {
          throw "Could not locate Microsoft.NETCore.App.Host pack for $rid"
        }

        $nativeDir = Join-Path $packDir.FullName "runtimes\$rid\native"
        if (-not (Test-Path $nativeDir)) {
          throw "Could not locate native host directory: $nativeDir"
        }

        "BOOTSTRAPPER_NATIVE_DIR=$nativeDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    - name: Initialize CodeQL
      uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
        queries: +security-extended,security-and-quality

    - name: Restore dependencies
      run: dotnet restore WpfDevTools.sln --locked-mode

    - name: Build selected language
      shell: pwsh
      run: |
        if ('${{ matrix.language }}' -eq 'csharp') {
          dotnet build WpfDevTools.sln `
            --configuration Release `
            --no-restore `
            -p:Platform=x64 `
            -nodeReuse:false `
            -p:UseSharedCompilation=false
        }
        elseif ('${{ matrix.language }}' -eq 'c-cpp') {
          & msbuild src/WpfDevTools.Bootstrapper/WpfDevTools.Bootstrapper.vcxproj `
            /m `
            /nologo `
            "/p:Configuration=Release" `
            "/p:Platform=x64" `
            "/p:LinkIncremental=false" `
            "/p:NetHostIncludeDir=$env:BOOTSTRAPPER_NATIVE_DIR" `
            "/p:NetHostLibDir=$env:BOOTSTRAPPER_NATIVE_DIR"
        }
        else {
          throw "Unsupported CodeQL language: ${{ matrix.language }}"
        }

    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@dc73d59c2d7bd4f8194098a91219eeee6d8a1719 # v4
      with:
        category: "/language:${{ matrix.language }}"
