        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.publish-release-assets.outputs.release-tag }}
        run: |
          $tag = $env:RELEASE_TAG
          $stagingRoot = Join-Path '${{ env.RELEASE_STAGING_ROOT }}' $tag
          $packageArchive = Get-ChildItem $stagingRoot -File -Filter 'release_*_win-arm64.zip' |
