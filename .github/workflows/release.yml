      - name: Uninstall staged x86 online installer smoke test
        shell: pwsh
        run: |
          $installedScript = Join-Path (Resolve-Path './tmp-release-bootstrap-smoke').Path 'x86\current\bin\install.ps1'

          if (-not (Test-Path $installedScript)) {
            throw "Could not locate installed online-installer payload at $installedScript"
          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-bootstrap-smoke' -Architecture 'x86' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged x86 online installer residue test
