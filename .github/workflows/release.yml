          }

          & powershell -ExecutionPolicy Bypass -File $installedScript -Action uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'x86' -Client other -NonInteractive -OutputJson

      - name: Full uninstall staged installed x86 package residue test
        shell: pwsh
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/online-installer.ps1 -Action full-uninstall -InstallRoot './tmp-release-install-smoke' -Architecture 'x86' -Client other -NonInteractive -OutputJson
